<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lewes Clock Walks</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="../walk.css" />
</head>
<body>
  <div id="title"></div>
  <div id="map"></div>
  <script src="../walks.js?v=2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const slug = location.pathname.split('/').pop().replace('.html', '');
    const walk = walks.find(w => w.slug === slug);
    if (walk) {
      document.title = walk.label + ' \u2013 Lewes Clock Walks';
      document.getElementById('title').textContent = walk.label;
    }

    const map = L.map('map').setView([50.8745, -0.0022], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19
    }).addTo(map);

    fetch(`../data/${slug}.json?v=${Date.now()}`)
      .then(r => r.json())
      .then(geojson => {
        const coords = geojson.features
          .filter(f => f.geometry.type === 'LineString')
          .flatMap(f => f.geometry.coordinates)
          .map(([lng, lat]) => L.latLng(lat, lng));

        if (coords.length === 0) return;

        const layer = L.geoJSON(geojson, {
          style: { color: '#e63946', weight: 4, opacity: 0.85 }
        }).addTo(map);
        map.fitBounds(layer.getBounds(), { padding: [40, 40] });

        let totalMetres = 0;
        for (let i = 1; i < coords.length; i++) {
          totalMetres += coords[i - 1].distanceTo(coords[i]);
        }
        const label = `${(totalMetres / 1000).toFixed(1)} km / ${(totalMetres / 1609.344).toFixed(1)} mi`;

        const midpoint = coords[Math.floor(coords.length / 2)];
        L.marker(midpoint, {
          icon: L.divIcon({
            className: '',
            html: `<div class="route-label">${label}</div>`,
            iconAnchor: [0, 0]
          })
        }).addTo(map);
      })
      .catch(err => console.error(`Failed to load ${slug}.json:`, err));
  </script>
</body>
</html>
